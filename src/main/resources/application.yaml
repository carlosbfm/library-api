spring:
  application:
    name: library-api
  
  datasource:
    url: jdbc:postgresql://localhost:5433/library_db
    username: admin
    password: admin
    driver-class-name: org.postgresql.Driver
  
  data:
    web:
      pageable:
        default-page-size: 5
        max-page-size: 100

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

